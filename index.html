<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>이상현상 조사국 — 사건 기록보관소</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Noto+Sans+KR:wght@400;500;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-void:#12160f;
    --bg-void-2:#1b2016;
    --bg-void-3:#20261b;
    --paper:#ece3c8;
    --paper-shadow:#cdc09a;
    --ink:#2b2618;
    --ink-soft:#5c5540;
    --brass:#a8822a;
    --brass-bright:#c79c3a;
    --verdigris:#5f7a63;
    --red-stamp:#8c2f22;
    --amber-stamp:#a8622a;
    --green-stamp:#3f5c3f;
    --line:#3a4232;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:transparent;color:var(--paper);font-family:'Noto Sans KR',sans-serif;}
  .app{
    min-height:100vh;
    background:
      radial-gradient(ellipse at 20% 0%, rgba(95,122,99,0.10), transparent 55%),
      radial-gradient(ellipse at 90% 30%, rgba(168,130,42,0.07), transparent 50%),
      var(--bg-void);
    padding:28px 18px 80px;
  }
  .wrap{max-width:1080px;margin:0 auto;}

  .header{position:relative;margin-bottom:28px;}
  .tab{
    display:inline-flex;align-items:baseline;gap:12px;
    background:var(--bg-void-3);
    border:1px solid var(--line);
    border-bottom:none;
    padding:10px 22px 14px;
    border-radius:8px 14px 0 0;
    position:relative;
  }
  .tab::after{
    content:"";position:absolute;left:0;right:0;bottom:-1px;height:3px;
    background:linear-gradient(90deg,var(--verdigris),var(--brass));
  }
  .tab h1{
    font-family:'Gowun Batang',serif;font-weight:700;
    font-size:22px;margin:0;color:var(--paper);letter-spacing:0.5px;
  }
  .tab .code{
    font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--brass-bright);
    letter-spacing:1px;
  }
  .subline{
    font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--ink-soft);
    padding:10px 4px 0;letter-spacing:0.5px;
  }

  .banner{
    display:flex;justify-content:space-between;align-items:center;gap:10px;
    background:rgba(140,47,34,0.18);border:1px solid var(--red-stamp);color:#f2d9d0;
    padding:10px 14px;border-radius:8px;margin-bottom:16px;font-size:12px;
    font-family:'JetBrains Mono',monospace;line-height:1.5;
  }
  .banner button{
    background:none;border:1px solid var(--red-stamp);color:#f2d9d0;border-radius:5px;
    padding:4px 10px;font-size:11px;cursor:pointer;white-space:nowrap;
  }

  .topbar{
    display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;
    margin:20px 0 22px;padding:12px 16px;
    background:var(--bg-void-2);border:1px solid var(--line);border-radius:10px;
  }
  .agent{
    font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--paper);
  }
  .agent b{color:var(--brass-bright);}
  .btn{
    font-family:'Noto Sans KR',sans-serif;font-weight:500;font-size:13px;
    border:1px solid var(--line);background:transparent;color:var(--paper);
    padding:9px 16px;border-radius:7px;cursor:pointer;transition:.15s;
  }
  .btn:hover{border-color:var(--verdigris);background:rgba(95,122,99,0.12);}
  .btn.primary{
    background:var(--verdigris);border-color:var(--verdigris);color:#0e120d;font-weight:700;
  }
  .btn.primary:hover{background:#6f8e73;}
  .btn.ghost{color:var(--ink-soft);}

  .authbox{
    max-width:420px;margin:60px auto;
    background:var(--paper);color:var(--ink);
    border-radius:4px;padding:28px 26px 24px;
    box-shadow:0 20px 50px rgba(0,0,0,0.45), 0 0 0 1px var(--paper-shadow);
    position:relative;
  }
  .authbox::before{
    content:"ACCESS";position:absolute;top:14px;right:-10px;
    font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:2px;
    background:var(--red-stamp);color:#f2e9d8;padding:3px 10px;
    transform:rotate(6deg);border-radius:2px;opacity:0.9;
  }
  .authbox h2{
    font-family:'Gowun Batang',serif;font-size:20px;margin:0 0 4px;
  }
  .authbox .desc{font-size:12px;color:var(--ink-soft);margin-bottom:20px;font-family:'JetBrains Mono',monospace;}
  .authtabs{display:flex;gap:0;margin-bottom:18px;border-bottom:1px solid var(--paper-shadow);}
  .authtabs button{
    flex:1;background:none;border:none;padding:9px 0;cursor:pointer;
    font-family:'Noto Sans KR',sans-serif;font-weight:700;font-size:13px;color:var(--ink-soft);
    border-bottom:2px solid transparent;
  }
  .authtabs button.active{color:var(--ink);border-bottom-color:var(--brass);}
  .field{margin-bottom:14px;}
  .field label{display:block;font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--ink-soft);margin-bottom:5px;letter-spacing:0.5px;}
  .field input, .field select, .field textarea{
    width:100%;padding:10px 11px;font-size:14px;border:1px solid var(--paper-shadow);
    background:#f6f0dd;color:var(--ink);border-radius:4px;font-family:'Noto Sans KR',sans-serif;
  }
  .field input:focus, .field select:focus, .field textarea:focus{outline:2px solid var(--verdigris);outline-offset:1px;}
  .authbox .btn.primary{width:100%;padding:11px;font-size:14px;margin-top:6px;}
  .err{color:var(--red-stamp);font-size:12px;margin-top:8px;font-family:'JetBrains Mono',monospace;}
  .hint{font-size:11px;color:var(--ink-soft);margin-top:14px;line-height:1.5;}

  .controls{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px;align-items:center;}
  .controls select, .controls input[type=text]{
    background:var(--bg-void-2);border:1px solid var(--line);color:var(--paper);
    padding:9px 12px;border-radius:7px;font-size:13px;font-family:'Noto Sans KR',sans-serif;
  }
  .controls input[type=text]{flex:1;min-width:160px;}
  .count{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--ink-soft);}

  .intake{
    background:var(--paper);color:var(--ink);border-radius:6px;padding:22px 22px 18px;
    margin-bottom:24px;box-shadow:0 14px 34px rgba(0,0,0,0.4);
    animation:dropdown .22s ease;
  }
  @keyframes dropdown{from{opacity:0;transform:translateY(-8px);}to{opacity:1;transform:translateY(0);}}
  .intake h3{font-family:'Gowun Batang',serif;margin:0 0 14px;font-size:18px;}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  @media(max-width:560px){.grid2{grid-template-columns:1fr;}}
  .intake-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:6px;}
  .intake-actions .btn{color:var(--ink);border-color:var(--paper-shadow);}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:22px;}
  .card{
    background:var(--paper);color:var(--ink);border-radius:3px;
    padding:18px 18px 16px;position:relative;
    box-shadow:0 10px 24px rgba(0,0,0,0.35), 0 0 0 1px var(--paper-shadow);
    border-top:3px dashed var(--paper-shadow);
  }
  .card:nth-child(3n+1){transform:rotate(-0.6deg);}
  .card:nth-child(3n+2){transform:rotate(0.4deg);}
  .card:nth-child(3n){transform:rotate(-0.3deg);}
  .card:hover{transform:rotate(0deg) translateY(-2px);transition:.15s;}
  .card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
  .case-code{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--ink-soft);letter-spacing:1px;}
  .stamp{
    font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;letter-spacing:1.5px;
    padding:4px 9px;border:2px solid; border-radius:3px;transform:rotate(-6deg);
    text-transform:uppercase;
  }
  .stamp.unconfirmed{color:var(--red-stamp);border-color:var(--red-stamp);}
  .stamp.investigating{color:var(--amber-stamp);border-color:var(--amber-stamp);}
  .stamp.confirmed{color:var(--green-stamp);border-color:var(--green-stamp);}
  .card-img{
    width:100%;height:150px;object-fit:cover;border-radius:3px;margin-bottom:10px;
    cursor:zoom-in;border:1px solid var(--paper-shadow);display:block;
  }
  .card h4{font-family:'Gowun Batang',serif;font-size:17px;margin:2px 0 8px;line-height:1.35;}
  .tag{
    display:inline-block;font-size:10px;font-family:'JetBrains Mono',monospace;
    background:var(--bg-void-2);color:var(--brass-bright);padding:3px 8px;border-radius:10px;
    margin-bottom:10px;letter-spacing:0.5px;
  }
  .meta{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--ink-soft);margin-bottom:8px;line-height:1.7;}
  .desc{font-size:13px;line-height:1.6;color:var(--ink);margin-bottom:12px;white-space:pre-wrap;}
  .desc.clamp{display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
  .more{font-size:11px;color:var(--verdigris);cursor:pointer;font-weight:700;}
  .card-footer{display:flex;justify-content:space-between;align-items:center;margin-top:12px;padding-top:10px;border-top:1px solid var(--paper-shadow);flex-wrap:wrap;gap:8px;}
  .reporter{font-size:11px;color:var(--ink-soft);font-family:'JetBrains Mono',monospace;}
  .witness-btn{
    font-family:'Noto Sans KR',sans-serif;font-size:11px;font-weight:700;
    background:transparent;border:1px solid var(--verdigris);color:var(--verdigris);
    padding:6px 10px;border-radius:14px;cursor:pointer;
  }
  .witness-btn:hover{background:var(--verdigris);color:#fff;}
  .witness-btn.done{border-color:var(--paper-shadow);color:var(--ink-soft);cursor:default;}
  .witness-btn.done:hover{background:transparent;}

  .empty{
    text-align:center;padding:60px 20px;color:var(--ink-soft);
    font-family:'JetBrains Mono',monospace;font-size:13px;
  }
  .empty b{color:var(--paper);}
  footer.note{
    text-align:center;margin-top:40px;font-size:11px;color:var(--ink-soft);
    font-family:'JetBrains Mono',monospace;
  }
  .lightbox{
    position:fixed;inset:0;background:rgba(0,0,0,0.85);display:flex;align-items:center;justify-content:center;
    z-index:999;cursor:zoom-out;padding:30px;
  }
  .lightbox img{max-width:100%;max-height:100%;border-radius:6px;box-shadow:0 20px 60px rgba(0,0,0,0.6);}
  ::selection{background:var(--verdigris);color:#fff;}
</style>
</head>
<body>
<div class="app"><div class="wrap" id="root"></div></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const CATEGORIES = [
  {v:"cryptid", label:"크립티드 · 미확인 생명체"},
  {v:"ufo", label:"UFO · 우주현상"},
  {v:"ghost", label:"유령 · 영적현상"},
  {v:"circle", label:"미스터리 서클 · 흔적"},
  {v:"sound", label:"정체불명의 소리·음향"},
  {v:"etc", label:"기타 초자연현상"},
];
const catLabel = v => (CATEGORIES.find(c=>c.v===v)||{}).label || v;

/* ---------------- Supabase 설정 ----------------
   아래 두 값을 Supabase 대시보드 → Project Settings → API 에서
   그대로 복사해 붙여넣으세요. anon/public 키는 공개되어도 되는 키입니다
   (실제 접근 제어는 DB의 RLS 정책이 담당합니다). */
const SUPABASE_URL = "https://YOUR-PROJECT-REF.supabase.co";
const SUPABASE_ANON_KEY = "YOUR-ANON-PUBLIC-KEY";
/* ------------------------------------------------ */

const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// 원본 UI는 "아이디"로 로그인하지만 Supabase Auth는 이메일 기반이라,
// 아이디를 내부적으로 가짜 이메일로 변환해서 씁니다. 사용자에게는 노출되지 않습니다.
function usernameToEmail(username){
  return username.trim().toLowerCase().replace(/[^a-z0-9_\-]/g, "_") + "@exfiles.local";
}

let state = {
  loading: true,
  currentUser: null,
  sightings: [],
  authMode: "login",
  authError: "",
  authBusy: false,
  showIntake: false,
  filterCat: "all",
  search: "",
  expanded: {},
  banner: null,
  lightboxImg: null,
};

const root = document.getElementById("root");

function friendlyAuthError(msg){
  if(!msg) return "요청 처리 중 오류가 발생했습니다.";
  if(/already registered|already exists|User already registered/i.test(msg)) return "이미 사용 중인 아이디입니다.";
  if(/Invalid login credentials/i.test(msg)) return "아이디 또는 비밀번호가 일치하지 않습니다.";
  if(/Password should be at least/i.test(msg)) return "비밀번호는 6자 이상이어야 합니다.";
  if(/Failed to fetch|NetworkError/i.test(msg)) return "서버에 연결할 수 없습니다. 잠시 후 다시 시도해 주세요.";
  return msg;
}

function mapSighting(row){
  return {
    id: row.id,
    title: row.title,
    category: row.category,
    location: row.location,
    date: row.date,
    desc: row.description,
    image: row.image,
    reporter: row.reporter,
    createdAt: row.created_at,
    witnesses: (row.witnesses || []).map(w => w.username),
  };
}

async function fetchSightings(){
  const { data, error } = await sb
    .from("sightings")
    .select("*, witnesses(username)")
    .order("created_at", { ascending: false });
  if(error) throw error;
  return (data || []).map(mapSighting);
}

async function loadAll(){
  try{
    const { data: { session } } = await sb.auth.getSession();
    state.currentUser = session?.user?.user_metadata?.username || null;
  }catch(e){
    state.banner = "⚠ 로그인 상태를 확인하지 못했습니다: " + friendlyAuthError(e.message);
  }
  if(state.currentUser){
    try{
      state.sightings = await fetchSightings();
    }catch(e){
      state.sightings = [];
      state.banner = "⚠ 사건 기록을 불러오지 못했습니다: " + friendlyAuthError(e.message);
    }
  }
  state.loading = false;
  render();

  // 다른 탭에서 로그인/로그아웃 하거나 토큰이 갱신되면 화면에도 반영
  sb.auth.onAuthStateChange((_event, session) => {
    const newUser = session?.user?.user_metadata?.username || null;
    if(newUser !== state.currentUser){
      state.currentUser = newUser;
      state.showIntake = false;
      if(newUser){
        fetchSightings().then(s => { state.sightings = s; render(); }).catch(()=>{});
      }
      render();
    }
  });
}

function statusOf(s){
  const n = (s.witnesses||[]).length;
  if(n>=3) return {key:"confirmed", label:"확인됨"};
  if(n>=1) return {key:"investigating", label:"조사중"};
  return {key:"unconfirmed", label:"미확인"};
}
function caseCode(idx){ return "CASE-" + String(idx+1).padStart(4,"0"); }
function esc(str){
  const d = document.createElement("div");
  d.textContent = str==null?"":str;
  return d.innerHTML;
}

/* ---------------- Auth actions ---------------- */
async function doRegister(username, password){
  if(state.authBusy) return;
  state.authError = "";
  if(!username || !password){ state.authError = "아이디와 비밀번호를 모두 입력해 주세요."; render(); return; }
  state.authBusy = true; render();
  try{
    const { data, error } = await sb.auth.signUp({
      email: usernameToEmail(username),
      password,
      options: { data: { username: username.trim() } },
    });
    if(error) throw error;
    if(!data.session){
      // 이메일 확인이 켜져 있으면 세션 없이 끝남 → 관리자가 Confirm email을 꺼야 함
      state.authError = "가입은 되었지만 자동 로그인에 실패했습니다. Supabase Authentication 설정에서 'Confirm email'이 꺼져 있는지 확인해 주세요.";
      state.authBusy = false; render(); return;
    }
    state.currentUser = data.user.user_metadata.username;
    state.sightings = await fetchSightings();
  }catch(e){
    state.authError = friendlyAuthError(e.message);
  }finally{
    state.authBusy = false;
    render();
  }
}
async function doLogin(username, password){
  if(state.authBusy) return;
  state.authError = "";
  if(!username || !password){ state.authError = "아이디와 비밀번호를 모두 입력해 주세요."; render(); return; }
  state.authBusy = true; render();
  try{
    const { data, error } = await sb.auth.signInWithPassword({
      email: usernameToEmail(username),
      password,
    });
    if(error) throw error;
    state.currentUser = data.user.user_metadata.username;
    state.sightings = await fetchSightings();
  }catch(e){
    state.authError = friendlyAuthError(e.message);
  }finally{
    state.authBusy = false;
    render();
  }
}
async function doLogout(){
  try{ await sb.auth.signOut(); }catch(e){ /* 무시하고 클라이언트 상태는 초기화 */ }
  state.currentUser = null;
  state.showIntake = false;
  render();
}

/* ---------------- Sighting actions ---------------- */
async function addSighting(data){
  try{
    const { data: created, error } = await sb
      .from("sightings")
      .insert({
        title: data.title,
        category: data.category,
        location: data.location,
        date: data.date || null,
        description: data.desc,
        image: data.image || null,
      })
      .select("*, witnesses(username)")
      .single();
    if(error) throw error;
    state.sightings = [mapSighting(created), ...state.sightings];
    state.showIntake = false;
    state.banner = null;
  }catch(e){
    state.banner = "⚠ 사건 파일 등록에 실패했습니다: " + friendlyAuthError(e.message);
  }
  render();
}
async function addWitness(id){
  const s = state.sightings.find(x=>x.id===id);
  if(!s) return;
  s.witnesses = s.witnesses || [];
  if(s.witnesses.includes(state.currentUser)) return;
  // optimistic update
  s.witnesses = [...s.witnesses, state.currentUser];
  render();
  try{
    const { error } = await sb.from("witnesses").insert({ sighting_id: id });
    if(error && error.code !== "23505"){ throw error; } // 23505 = 이미 목격 등록함(중복), 무시
  }catch(e){
    // 실패 시 롤백
    s.witnesses = s.witnesses.filter(w => w !== state.currentUser);
    state.banner = "⚠ 목격 반영에 실패했습니다: " + friendlyAuthError(e.message);
    render();
  }
}

/* ---------------- Render ---------------- */
function render(){
  if(state.loading){
    root.innerHTML = `<div class="empty">기록보관소 접속 중...</div>`;
    return;
  }
  root.innerHTML = `
    <div class="header">
      <div class="tab">
        <h1>이상현상 조사국</h1>
        <span class="code">EX-FILES ARCHIVE</span>
      </div>
      <div class="subline">// 목격 제보 접수 및 사건 기록 보관소 — 미확인 생명체 · 초자연현상 통합 데이터베이스</div>
    </div>
    ${state.banner ? `<div class="banner"><span>${esc(state.banner)}</span><button id="dismiss-banner">닫기</button></div>` : ""}
    ${state.currentUser ? renderMain() : renderAuth()}
    ${state.lightboxImg ? `<div class="lightbox" id="lightbox"><img src="${esc(state.lightboxImg)}"></div>` : ""}
    <footer class="note">본 기록보관소는 참여자 간 재미로 공유되는 제보 아카이브이며, 인증된 조사 자료가 아닙니다.</footer>
  `;
  bindEvents();
}

function renderAuth(){
  return `
    <div class="authbox">
      <h2>출입 인증</h2>
      <div class="desc">CLEARANCE REQUIRED — 조사국 자료실 이용을 위해 인증하세요</div>
      <div class="authtabs">
        <button data-authtab="login" class="${state.authMode==='login'?'active':''}">로그인</button>
        <button data-authtab="register" class="${state.authMode==='register'?'active':''}">신규 등록</button>
      </div>
      <form id="authform">
        <div class="field">
          <label>조사관 ID</label>
          <input type="text" id="au-username" autocomplete="off" placeholder="아이디 입력">
        </div>
        <div class="field">
          <label>비밀번호</label>
          <input type="password" id="au-password" placeholder="비밀번호 입력">
        </div>
        ${state.authError ? `<div class="err">${esc(state.authError)}</div>` : ""}
        <button type="submit" class="btn primary" ${state.authBusy?'disabled':''}>${state.authBusy ? "처리 중..." : (state.authMode==='login' ? "출입 승인 요청" : "조사관 등록")}</button>
      </form>
      <div class="hint">※ 비밀번호는 Supabase 서버에서 안전하게 암호화되어 저장됩니다. 그래도 다른 곳에서 쓰는 비밀번호는 재사용하지 마세요. 비밀번호는 최소 6자 이상이어야 합니다.</div>
    </div>
  `;
}

function renderMain(){
  const list = state.sightings
    .map((s, idx) => ({...s, _origIdx: idx}))
    .filter(s => state.filterCat==="all" || s.category===state.filterCat)
    .filter(s => {
      if(!state.search) return true;
      const q = state.search.toLowerCase();
      return (s.title||"").toLowerCase().includes(q) || (s.location||"").toLowerCase().includes(q) || (s.desc||"").toLowerCase().includes(q);
    });

  return `
    <div class="topbar">
      <div class="agent">조사관 <b>${esc(state.currentUser)}</b> 님, 접속을 환영합니다.</div>
      <div style="display:flex;gap:8px;">
        <button class="btn primary" id="toggle-intake">${state.showIntake ? "접수 취소" : "+ 새 사건 접수"}</button>
        <button class="btn ghost" id="logout-btn">로그아웃</button>
      </div>
    </div>

    ${state.showIntake ? renderIntake() : ""}

    <div class="controls">
      <select id="filter-cat">
        <option value="all" ${state.filterCat==='all'?'selected':''}>전체 유형</option>
        ${CATEGORIES.map(c=>`<option value="${c.v}" ${state.filterCat===c.v?'selected':''}>${c.label}</option>`).join("")}
      </select>
      <input type="text" id="search-box" placeholder="제목 · 장소 · 내용 검색" value="${esc(state.search)}">
      <span class="count">총 ${state.sightings.length}건 중 ${list.length}건 표시</span>
    </div>

    ${list.length===0 ? `<div class="empty">등록된 사건 기록이 없습니다.<br><b>+ 새 사건 접수</b> 버튼으로 첫 제보를 남겨보세요.</div>` : `
      <div class="grid">
        ${list.map(s => renderCard(s)).join("")}
      </div>
    `}
  `;
}

function renderIntake(){
  return `
    <div class="intake">
      <h3>사건 접수 양식</h3>
      <form id="intake-form">
        <div class="grid2">
          <div class="field">
            <label>사건명 / 제목</label>
            <input type="text" id="in-title" placeholder="예) 뒷산에서 목격한 발광체" required>
          </div>
          <div class="field">
            <label>분류</label>
            <select id="in-category">
              ${CATEGORIES.map(c=>`<option value="${c.v}">${c.label}</option>`).join("")}
            </select>
          </div>
          <div class="field">
            <label>목격 장소</label>
            <input type="text" id="in-location" placeholder="예) 대구 앞산공원 인근" required>
          </div>
          <div class="field">
            <label>목격 일시</label>
            <input type="date" id="in-date">
          </div>
        </div>
        <div class="field">
          <label>이미지 URL (선택)</label>
          <input type="text" id="in-image" placeholder="https:// 로 시작하는 이미지 링크를 붙여넣으세요">
        </div>
        <div class="field">
          <label>상세 내용</label>
          <textarea id="in-desc" rows="4" placeholder="목격 당시 상황을 최대한 구체적으로 적어주세요." required></textarea>
        </div>
        <div class="intake-actions">
          <button type="button" class="btn" id="cancel-intake">취소</button>
          <button type="submit" class="btn primary">사건 파일 등록</button>
        </div>
      </form>
    </div>
  `;
}

function renderCard(s){
  const st = statusOf(s);
  const expanded = !!state.expanded[s.id];
  const wCount = (s.witnesses||[]).length;
  const iAmWitness = (s.witnesses||[]).includes(state.currentUser) || s.reporter===state.currentUser;
  return `
    <div class="card">
      <div class="card-top">
        <span class="case-code">${caseCode(s._origIdx)}</span>
        <span class="stamp ${st.key}">${st.label}</span>
      </div>
      ${s.image ? `<img class="card-img" src="${esc(s.image)}" data-lightbox="${esc(s.image)}" onerror="this.style.display='none'">` : ""}
      <span class="tag">${catLabel(s.category)}</span>
      <h4>${esc(s.title)}</h4>
      <div class="meta">
        장소 · ${esc(s.location||"미상")}<br>
        목격일 · ${esc(s.date||"미상")}
      </div>
      <div class="desc ${expanded?'':'clamp'}">${esc(s.desc)}</div>
      <div class="more" data-expand="${s.id}">${expanded ? "접기" : "전체 내용 보기"}</div>
      <div class="card-footer">
        <span class="reporter">제보자 · ${esc(s.reporter)} · 동일 목격 ${wCount}건</span>
        <button class="witness-btn ${iAmWitness?'done':''}" data-witness="${s.id}" ${iAmWitness?'disabled':''}>
          ${iAmWitness ? "제보 반영됨" : "나도 봤어요"}
        </button>
      </div>
    </div>
  `;
}

function bindEvents(){
  document.querySelectorAll("[data-authtab]").forEach(b=>{
    b.onclick = ()=>{ state.authMode = b.dataset.authtab; state.authError=""; render(); };
  });
  const authform = document.getElementById("authform");
  if(authform){
    authform.onsubmit = (e)=>{
      e.preventDefault();
      const u = document.getElementById("au-username").value.trim();
      const p = document.getElementById("au-password").value;
      if(state.authMode==='login') doLogin(u,p); else doRegister(u,p);
    };
  }
  const logoutBtn = document.getElementById("logout-btn");
  if(logoutBtn) logoutBtn.onclick = doLogout;
  const dismissBanner = document.getElementById("dismiss-banner");
  if(dismissBanner) dismissBanner.onclick = ()=>{ state.banner = null; render(); };

  const toggleIntake = document.getElementById("toggle-intake");
  if(toggleIntake) toggleIntake.onclick = ()=>{ state.showIntake = !state.showIntake; render(); };
  const cancelIntake = document.getElementById("cancel-intake");
  if(cancelIntake) cancelIntake.onclick = ()=>{ state.showIntake = false; render(); };

  const intakeForm = document.getElementById("intake-form");
  if(intakeForm){
    intakeForm.onsubmit = (e)=>{
      e.preventDefault();
      const title = document.getElementById("in-title").value.trim();
      const category = document.getElementById("in-category").value;
      const location = document.getElementById("in-location").value.trim();
      const date = document.getElementById("in-date").value;
      const image = document.getElementById("in-image").value.trim();
      const desc = document.getElementById("in-desc").value.trim();
      if(!title || !location || !desc) return;
      addSighting({title, category, location, date, desc, image});
    };
  }

  const filterCat = document.getElementById("filter-cat");
  if(filterCat) filterCat.onchange = ()=>{ state.filterCat = filterCat.value; render(); };
  const searchBox = document.getElementById("search-box");
  if(searchBox){
    searchBox.oninput = ()=>{ state.search = searchBox.value; render(); };
    const val = searchBox.value; searchBox.focus(); searchBox.setSelectionRange(val.length,val.length);
  }

  document.querySelectorAll("[data-expand]").forEach(el=>{
    el.onclick = ()=>{ state.expanded[el.dataset.expand] = !state.expanded[el.dataset.expand]; render(); };
  });
  document.querySelectorAll("[data-witness]").forEach(el=>{
    el.onclick = ()=>{ addWitness(el.dataset.witness); };
  });
  document.querySelectorAll("[data-lightbox]").forEach(el=>{
    el.onclick = ()=>{ state.lightboxImg = el.dataset.lightbox; render(); };
  });
  const lightbox = document.getElementById("lightbox");
  if(lightbox) lightbox.onclick = ()=>{ state.lightboxImg = null; render(); };
}

loadAll();
</script>
</body>
</html>
